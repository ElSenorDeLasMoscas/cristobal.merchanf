<script>const BOOKS_DATA=[{"id":"kuhn2011","tags":["filosofía-de-la-ciencia","teoría-social","sociología"],"fecha":"Junio 2026","author":"Kuhn, T. S.","fullName":"Kuhn, Thomas Samuel","title":"La estructura de las revoluciones científicas","year":"2011","stars":4,"cover":"data/img/portada-kuhn.jpg","publisher":"Fondo de Cultura Económica","caption":"Kuhn sostiene que la ciencia en vez de avanzar acumulando verdades, salta entre paradigmas: marcos compartidos que definen qué problemas valen, qué cuenta como solución y qué anomalías se pueden ignorar. La \"ciencia normal\" resuelve enigmas dentro de ese marco, mientras que la revolución ocurre cuando las anomalías se acumulan, el paradigma entra en crisis y una comunidad —sobre todo la generación joven— migra hacia un candidato rival. Es un giro casi gestáltico en el que el mismo fenómeno se ve distinto. Pero una idea clara en el texto, es que nadie subvierte una tradición sin haberla dominado antes, sin dominar \"lo clasico\".","citation":"Kuhn, T. S. (2011). <em>La estructura de las revoluciones científicas<\/em>. Fondo de Cultura Económica.","review":"Kuhn atiende una idea que la mayoría damos por obvia, y es que estamos acostumbrad_s a decir que la ciencia avanza acumulando verdades o \"conocimiento\".Lo que propone en cambio es que la ciencia trabaja por <strong>paradigmas<\/strong>, es decir, \"realizaciones científicas universalmente reconocidas que, durante cierto tiempo, proporcionan modelos de problemas y soluciones a una comunidad científica\" (de algun modo, una lente), y que el paso de un paradigma a otro no es acumulación, sino ruptura.\n\nEl concepto nace de una observación que a quienes venimos de las ciencias sociales nos toca de cerca; las ciencias naturales discuten mucho menos sobre sus propios fundamentos que las sociales, el autociestionamiento es menos por así decirlo. Kuhn no lo atribuye a una madurez mayor ni a una superioridad epistémica, sino a que las naturales comparten un paradigma y las sociales lo tienen de forma más frágil o disputada, en un constante cambio, ajuste y discusión, en aprte por ser producto de una actividad social que estudia las actividades y creencias sociales (porque en realidad toda ciecnia es una actividad social). De algun modo, esa sola distinción ya reordena la jerarquía con la que solemos mirar nuestra propia disciplina, casi cómo si las naturales y las sociales estuvieran en dimensinoes distintas de conocimiento.\n\n<strong>La ciencia normal<\/strong> es la que se hace dentro de un paradigma ya aceptado. No cuestiona los fundamentos, sino que, resuelve enigmas dentro del marco establecido, determina qué preguntas son legítimas, define qué cuenta como solución válida y, de paso, suprime las anomalías que no logra resolver. Acumula conocimiento, y lo hace dentro de los límites que el propio paradigma trazó. Y hay un mecanismo acá que conviene no pasar por alto: esa misma normalidad, al fijar con precisión qué se espera, es la que termina volviendo visibles las anomalías. No se ve lo que sobra hasta que el marco define con nitidez lo que debería caber.\n\n<strong>La revolución científica<\/strong> es un cambio de paradigma, un giro casi gestáltico en el que el mismo fenómeno pasa a verse de otra manera por l_s actor_s que conforman ese campo de conocimiento. No ocurre por decreto ni por la pura suma de evidencia, sino cuando la ciencia normal entra en crisis (las anomalías que no puede resolver se acumulan), aparece un \"paradigma\" alternativo y la comunidad, sobre todo la generación más joven, migra hacia él para explorar los propios limites de ese paradigma. Y el matiz no es menor, porque lo que decide no es solo el dato, sino quién está dispuesto a cambiar de mirada y a pasar de una ciencia normal a una nueva ciencia. El revolucionario científico (en terminos de Kuhn) debe dominar a fondo la tradición antes de poder subvertirla; no hay ruptura sin haber sido primero un \"tradicionalista absoluto\". La innovación radical no viene de afuera del entramado, sino de quien lo conoce desde dentro y a la vez ocupa una posición marginal en él. Acá la lectura conversa de forma natural con Bourdieu: lo que Kuhn llama tensión esencial se parece mucho a la \"marginalidad productiva\" (el caso de Einstein), y explica por qué alguien con todo el capital pero sin esa posición marginal termina siendo reformista y no revolucionario. La revolución, de esta forma, no es cuestión de talento ni de audacia, sino de una combinación precisa de capital acumulado y posición en el campo.\n\nAhora bien, ¿qué hace este libro en una reseña de alguien que trabaja en bibliotecología y le interesa la ciencia abierta, la desinformación y estas cuestiones? Bastante, la verdad. Si miramos el régimen actual de evaluación (factor de impacto, rankings, \"excelencia\") como una forma de ciencia normal, se entiende mejor por qué opera como opera: define qué publicaciones cuentan, qué revistas son legítimas y qué queda como anomalía tolerada o directamente invisibilizada (el diamante, lo que se publica en SciELO, buena parte de la producción regional). El acceso abierto, leído así, no es solo una mejora técnica de la distribución, sino un candidato a paradigma que disputa qué cuenta como ciencia válida y quién tiene la autoridad para decidirlo.\n\nY es justo ahí donde Kuhn se vuelve interesante. Porque su esquema obliga a una pregunta para el propio movimiento de la ciencia abierta\n\n ¿estamos ante un verdadero cambio de paradigma, o ante una reacomodación dentro del mismo paradigma de prestigio, donde lo \"abierto\" se vuelve una métrica más, un sello que se exhibe sin tocar la estructura que produce el valor? El libro no responde (no es su tarea), pero entrega los instrumentos para no confundir la crisis con la revolución, ni el recambio de etiquetas con un giro real en la mirada. Y para quienes pensamos el ecosistema científico desde la gestión y la evaluación, esa distinción lo es todo.\n\n algo cuestionable sin embargo, de esta lectura es que Kuhn de algun modo le atribuye la capacidad de revolución, en su esquema (Preciencia → Ciencia Normal → Crisis → Revolución) a un proceso casi espontáneo, producido casi de manera natural por la acumulación de anomalias y conocimeinto en el campo, sin embargo, tanto el comportamiento científico y estudios cienciométricos arrojan, es que parte de este cambi de aparadigmas tambien se asocia a intereses politicos, económicos y de posicionamiento de actores dentro del campo, lo que no es necesariamente un proceso espontáneo, sino que puede ser impulsado por actores estratégicos que buscan desplazar el paradigma dominante. Esto no invalida el esquema de Kuhn, pero sí sugiere que la dinámica de cambio de paradigmas puede ser más compleja y estar influenciada por factores externos al propio desarrollo científico."},{"id":"velez2013","tags":["cienciometría","bibliometría","sociología"],"fecha":"Junio 2026","author":"Vélez Cuartas, G.","fullName":"Vélez Cuartas, Gabriel","title":"Sociología de la Ciencia y Cienciometría: Una revisión de las teorías subyacentes","year":"2013","stars":5,"cover":"data/img/portada-velez.jpg","publisher":"Revista Interamericana de Bibliotecología, 36(1), 11-24","caption":"Se revisan las principales teorías sociológicas que operan de manera subyacente en los estudios cienciométricos. Propone tres modelos fundamentales: funcionalista (Price, Garfield), de la traducción (Callon, Law, teoría del actor-red) y sistémico (Leydesdorff, Luhmann). El artículo muestra que la cienciometría no es una mera técnica neutral, sino que cada enfoque metodológico arrastra una concepción específica de la ciencia, la sociedad y el poder. Es una invitación a no naturalizar los indicadores ni los rankings, y a preguntarse qué teoría y perspectiva social está guiando cada medición.","citation":"Vélez Cuartas, G. (2013). Sociología de la Ciencia y Cienciometría: Una revisión de las teorías subyacentes. <em>Revista Interamericana de Bibliotecología<\/em>, 36(1), 11-24. <a href='http://www.redalyc.org/articulo.oa?id=179029139002' target='_blank'>Enlace<\/a>","review":"La mayoría de los artículos cienciométricos aplican modelos metodológicos como si fueran obvios o naturales, sin explicitar las teorías sociológicas que los sostienen o el mecanismo de ver el mundo de estos modelos, o cómo los interpretan. El autor identifica tres tradiciones ocultas tras los mapas de ciencia, los índices de citación y los diagramas estratégicos.\n\n<strong>El modelo funcionalista<\/strong> (Price, Garfield): concibe la ciencia como un colectivo institucional donde el prestigio, la difusión y el reconocimiento (vía citas) organizan la producción de conocimiento. Es el modelo que alimenta los rankings y el factor de impacto. Su supuesto implícito es que la ciencia tiende naturalmente a la acumulación y que los científicos más productivos y citados son también los mejores propiamente por la naturaleza de la producción científica, donde la publicación en si surge de la crítica y la peusta en prueba de los supuestos científicos.\n\n<strong>El modelo de la traducción<\/strong> (Callon, Law, actor-red): disuelve la centralidad del individuo y la reemplaza por redes de problematizaciones, ya que lo que se mide no son autores sino intereses traducidos en palabras clave, co-ocurrencias y diagramas estratégicos. El poder no está en las personas sino en la capacidad de una problematización para interesar a otros actores (humanos y no humanos). Este modelo es especialmente útil para estudiar controversias tecnocientíficas y la influencia de la ciencia en la toma de decisiones a traves de la visualización de los componentes de la ciencia, que son estructurados por sus propios actores.\n\n<strong>El modelo sistémico<\/strong> (Leydesdorff, Luhmann): aquí el individuo es irrelevante y lo que importa es la autoorganización de la comunicación científica. En este modelo se estudian las redundancias, las entropías y la evolución de los mensajes en el tiempo. Es una perspectiva que observa cómo la ciencia se diferencia de otros sistemas (economía, política) y cómo se generan acoplamientos (por ejemplo, la triple hélice universidad-empresa-estado).\n\nAhora bien, si cada modelo cienciométrico lleva consigo una teoría de lo social, entonces elegir un indicador no es un acto técnico neutro u \"obvio\", al usar el factor de impacto, estamos adoptando una ontología funcionalista (la ciencia como acumulación de prestigio individual). Al usar análisis de co-palabras desde la teoría del actor-red, asumimos que el poder está en las problematizaciones y no en los autores. Al calcular entropías al estilo Leydesdorff, tratamos la ciencia como un sistema comunicativo cerrado.\n\n La pregunta para quien trabaja en acceso abierto o evaluación de revistas o ciencia en general es: ¿qué imagen de la ciencia quiero reforzar con mis métricas?\n\nEste artículo muestra que la cienciometría puede ser una caja negra o una caja de herramientas transparente simultaneamente, la falta de discusión teórica en muchos papers cienciométricos o de la bibliotecología, no significa que no haya teoría; significa que se ha naturalizado una teoría particular (normalmente la funcionalista) y se a adoptado sin un cuestionamiento o \"terapia semántica\"(esto l overemos en otra recomendación). La bibliotecología crítica puede recuperar los modelos de la traducción o sistémico para preguntarse, por ejemplo: ¿cómo se traduce el interés por el acceso abierto en redes de palabras que aparecen y desaparecen? ¿Qué problematizaciones logran volverse obligatorias en las políticas de ciencia abierta en América Latina?\n\nEste texto no nos da una respuesta, sino instrumentos para conceptualizar y debatir, generar una teoría más nutrida, reconocer que el saber que detrás de cada mapa de ciencia hay una apuesta ontológica. Para quienes nos dedicamos a la gestión de recursos digitales, la evaluación de publicaciones o el diseño de políticas de OA, esto es una invitación a hacer explícitas nuestras propias premisas y a no confundir los modelos con la realidad."},{"id":"bloor1998","tags":["filosofía-de-la-ciencia","sociología"],"fecha":"Junio 2026","author":"Bloor, D","fullName":"Bloor, David","title":"Conocimiento e imaginario social. Capitulo 1. El programa fuerte en sociología del conocimiento.","year":"1998","stars":4,"cover":"data/img/portada-bloor.jpg","publisher":"Gedisa Editorial","caption":"Se sintetiza el programa fuerte de la sociología del conocimiento. Un programa de investigación simétrico, causal, imparcial y reflexivo que trate las creencias verdaderas y falsas, racionales e irracionales, con exactamente los mismos tipos de explicación. Impulsa a estudiar la ciencia tal cómo se estudia una cultura o una religión, derribando la barrera que la propia sociología se ha impuesto en el estudio de otras ciecnias.","citation":"Bloor, David. (1998). El programa fuerte en sociología del conocimiento. En D. Bloor, Conocimiento e imaginario social (pp 13-58).","review":"Bloor abre el libro con una provocación metodológica, afirma que la sociología del conocimiento ha traicionado su propia vocación al excluir de su objeto de estudio el contenido del conocimiento científico, lógico y matemático. Mientras que los estudios sociales se atrevían a explicar cosmologías primitivas, religiones y creencias populares como fenómenos sociales, dejaban intacta la \"caja negra\" de la ciencia moderna, aceptando implícitamente que sus verdades son autónomas, auto-explicativas y trascendentes a toda determinación social. \n\n El argumento central es que esa exclusión no descansa en ninguna razón metodológica sólida, sino en un <strong>modelo teleológico del conocimiento<\/strong> filosóficamente asumido sin crítica: la idea de que la mente humana tiende naturalmente hacia la verdad y, por tanto, las creencias verdaderas no necesitan causa social mientras que solo el error, la desviación y la irracionalidad requieren explicación externa. Bloor rechaza ese modelo y propone en su lugar el <\/strong>programa fuerte<\/strong>: un programa de investigación simétrico, causal, imparcial y reflexivo que trate las creencias verdaderas y falsas, racionales e irracionales, con exactamente los mismos tipos de explicación. \n\n Dos ideas me resultan especialmente interesantes para quienes estudiamos la bibliotecología y nos interesa la ciencia abierta o más precisamente, el acceso abierto. \n\n 1. \"la prueba o evidencia es un fenómeno social\" (p. 26). Antes de que un artículo, dato o preprint sea considerado válido, debe existir un acuerdo comunitario (un paradigma, diría Kuhn) que establezca su relevancia y validez, comprendiendo tambien que la \"verdad\" solose manifiesta cuando la comunidad intenta destruir la evidencia científica, y si un método o teoría es lo suficientemente robusto, se afirma que se \"creó\" conocimeinto, el cual, por su peusto, se manifiesta cómo paper. Eso implica que las políticas de ciencia abierta no solo facilitan acceso técnico a las \"creencias científicas\" (cómo se referiría Bloor al \"producto\" de la ciencia), sino, que reconfiguran quién tiene autoridad para definir qué cuenta como evidencia. \n\n 2: el principio de simetría exige explicar el éxito y el fracaso de las prácticas científicas con los mismos tipos de causas. Aplicado al acceso abierto, significa que no basta con estudiar por qué ciertas universidades tienen baja adopción de este modelo, tambien hay que explicar la alta adopción sin recurrir a una supuesta \"bondad intrínseca\" del modelo. ¿El crecimiento del OA en Chile refleja una democratización genuina o una reconfiguración de posicionamiento del poder editorial que se camufla en el modelo? Bloor no responde, pero nos obliga a formular la pregunta en términos causales, no teleológicos, impulsando también un razonamiento contrafactico sobre nuestras propias premisas. \n\n En la Bibliotecología o en el razonamiento de la Ciencia Abierta, el programa fuerte no es un relativismo paralizante, es una invitación a extender el razonamiento de la causalidad, imparcialidad, simetría y la reflexibidad en nuestros campos y practicas."},{"id":"emirbayer1997","tags":["teoría-social","sociología","metodología"],"fecha":"Junio 2026","author":"Emirbayer, M.","fullName":"Emirbayer, Mustafa","title":"Manifiesto por una sociología relacional","year":"1997","stars":5,"cover":"data/img/portada-emirbayer.jpg","publisher":"American Journal of Sociology (Vol. 103, Nº 2)","caption":"La sociología ha estado atrapada en una \"trampa sustancialista\", esto quiere decir; tratar el mundo social como si estuviera hecho de cosas fijas (individuos, grupos, Estados) con esencias previas a sus relaciones. Emirbayer propone un giro radical hacia una sociología relacional (o transaccional), donde las unidades sociales no existen antes que sus relaciones; adquieren identidad, poder y significado exclusivamente a través de los procesos dinámicos en los que participan. El poder no es una posesión, la libertad no es un estatus legal, la desigualdad no nace de atributos individuales, todo son efectos de redes, transacciones y posiciones estructurales.","citation":"Emirbayer, M. (1997). Manifiesto por una sociología relacional. American Journal of Sociology, 103(2), 281-317. <a href='https://www.redalyc.org/articulo.oa?id=476349917012'target='_blank'>Enlace<\/a>","review":"El texto abre con una denuncia: la sociología ha operado durante siglos bajo un <strong>sustancialismo<\/strong> que convierte procesos en cosas. Ese hábito cognitivo tiene dos caras: la autoacción (buscar motores internos: intereses fijos, valores, programas culturales) y la interacción newtoniana (entidades estáticas que chocan sin transformarse). Ambas fallan porque confunden los efectos de la red con propiedades de los individuos. La alternativa es la <strong>transacción<\/strong>: el mundo social está hecho de relaciones que constituyen mutuamente a sus términos. No hay cazador sin la presa, ni capital sin la relación obrero-patrón, ni yo sin el reconocimiento del otro.\n\nPara la disciplina de la Bibliotecología creo que hay algunas cosas importantes.\n\n<strong>El poder como inmanente, no como posesión<\/strong> (Foucault, Bourdieu). La tentación en nuestro campo es pensar que las grandes editoriales o las agencias de financiación <strong>tienen<\/strong> poder, sin embargo, este poder (desde la mirada relacional) no reside en sus atributos internos, sino en la red de dependencias mutuas (evaluación, publicación, acreditación) y en cóm ose le confiere valor a esta red de relaciones. Si los investigadores decidieran retirarse de esa relación de forma coordinada, el poder se desvanecería, si las bibliotecas se restaran del acuerdo tácito y casi obligatorio de contener las ssuscripciones y pasara a una lógica \"abierta\" el control editorial se desvanecería. Esto cambia por completo nuestra estrategia o (logica si se quiere). No se trata de \"tomar el poder\" sino de reconfigurar las relaciones que lo producen y cómo reproducimos esa configuración en la formación de profesionales, por ejemplo.\n\n<strong>La desigualdad como efecto de agujeros estructurales<\/strong> (Ronald Burt), permite analizar la brecha entre universidades que adoptan rápidamente el acceso abierto y las que se rezagan, en las cuales este comportamiento no se explica solo por diferencias de recursos o conciencia. Burt mostraría que hay posiciones de puente (universidades que conectan redes internacionales con locales) y posiciones aisladas o perifericas en la red de relaciones. El éxito del OA en Chile no es solo mérito de las políticas, sino de quién ocupó los agujeros estructurales para traducir normas globales a prácticas locales, impulsando una presión en la periferia del movimiento y estableciendo rapidamente nuevas relaciones. El tema es de algun modo si, ¿el crecimiento del OA está reproduciendo una nueva forma de centralidad (algunas universidades como bisagras) o realmente está reduciendo las brechas?\n\nPara la disciplina, el manifiesto de Emirbayer nos invita a dejar de preguntar \"qué atributos tienen l_s bibliotecari_s exitos_s\" o \"qué cualidades tiene un repositorio de calidad\" y a preguntar, en cambio, <strong>en qué redes de transacción estamos insertos y cómo esas redes moldean nuestras prácticas, exclusiones y posibilidades de desarrollo dentro del ecosistema científico o laboral<\/strong>."}];const SCRIPTS_DATA=[{"id":"script3","tags":["cienciometría","bibliometría"],"fecha":"Junio 2026","extension":"PY","title":"Aplicación de análisis cienciométrico no basado en citas SOCHIFIT","author":"Merchan Farfán, C.","year":"2025","caption":"Este data set, es el resultado de la aplicación de un análisis cienciométrico no basado en citas, en el marco de una investigación realizada con Nicolas Quiroga (Phd en agronomía), este contiene una serie de recursos y procesos que se utiliaron desde clasificar automaticamente con  IA, hasta la aplicación de un análisis de redes para identificar el comportamiento y naturaliza del campo científico de la fitopatología a traves de la SOCHIFIT. En el archivo están todos los recursos para asegurar su reproducibilidad, desde los datos, el código y la documentación de cada uno de los procesos realizados.","citation":"Merchan Farfán, C. (2026). Aplicación de análisis cienciométrico no basado en citas SOCHIFIT (2.0) [Data set]. Unidad de Bibliotecas UOH. https://doi.org/10.5281/zenodo.20671883","download":"https://doi.org/10.5281/zenodo.20671883"},{"id":"script2","tags":["metodología","bibliometría","bibliotecas"],"fecha":"Junio 2026","extension":"PY","title":"Comparar, cruzar y homologar","author":"Merchan Farfán, C.","year":"2025","caption":"Este script es de mis favritos, es tan simple cómo tener dos archivos y comparar la columna \"título\" de cada uno. ¿El resultado? Un nuevo documento con los datos \"enfrentados\" y que agrega una columna que dice si encontró o no duplicados y en que porcentaje.", cisión individual de quien investiga. A partir de datos abiertos de OpenAlex (97.236 publicaciones), el análisis muestra que la producción financiada por ANID o FONDECYT se inclina más hacia la vía dorada que la no financiada por esas fuentes, y que la coautoría con el Norte Global se asocia a más vía dorada y menos diamante que la producción exclusivamente chilena o con colaboración sur-sur. La vía de apertura se comporta más como una huella de quién financia y con quién se firma, lo que sugiere que el mandato de acceso abierto y el régimen de evaluación científica no se enfrentan, sino que se acoplan por la vía dorada. El trabajo es un ejercicio de ciencia abierta (hipótesis registradas en OSF, protocolo reproducible bajo estructura IPO y materiales públicos) y se ofrece como un recorte piloto de una investigación más amplia sobre el CUECH.","citation":"Merchan Farfan, C. (2026). Heteronomía de la apertura. Financiamiento, colaboración y vías de acceso abierto en las universidades estatales chilenas (CUECH, 2015-2024). Facultad de Ciencias Sociales, Universidad de Chile.","url":"https://elsenordelasmoscas.github.io/reporte-abierto-cuech/"}];</script>

<script>
/* ── helpers ──────────────────────────────────────────────────────────── */
function stars(n) {

}

var iconMap = {
  'instagram': 'fab fa-instagram', 'youtube':    'fab fa-youtube',
  'linkedin':  'fab fa-linkedin',  'twitter':    'fab fa-x-twitter',
  'github':    'fab fa-github',    'tiktok':     'fab fa-tiktok',
  'spotify':   'fab fa-spotify',   'periodico':  'fas fa-newspaper',
  'audio':     'fas fa-headphones','podcast':    'fas fa-podcast',
  'libro':     'fas fa-book',      'base-datos': 'fas fa-database',
  'script':    'fas fa-code',      'video':      'fas fa-video',
  'articulo':  'fas fa-file-alt',  'web':        'fas fa-globe',
  'herramienta':'fas fa-wrench',   'datos':      'fas fa-table',
  'repositorio':'fas fa-folder-open'
};
var colorMap = {
  'instagram': '#c13584', 'youtube': '#ff0000', 'linkedin': '#0077b5',
  'twitter':   '#1a1a2e', 'github':  '#24292e', 'tiktok':   '#010101',
  'spotify':   '#1db954'
};

/* ── datos unificados ─────────────────────────────────────────────────── */
var ALL_DATA =
  BOOKS_DATA.map(function(b) { return Object.assign({_type: 'book'}, b); })
  .concat(SCRIPTS_DATA.map(function(s) { return Object.assign({_type: 'script'}, s); }))
  .concat(RECURSOS_DATA.map(function(r) { return Object.assign({_type: 'recurso'}, r); }))
  .concat(ENSAYOS_DATA.map(function(e) { return Object.assign({_type: 'ensayo'}, e); }));

/* ── card unificada ───────────────────────────────────────────────────── */
function explorarCardHtml(item) {
  var leftCol, action;
  if (item._type === 'book') {
    leftCol =
      '<div class="book-cover-side">' +
        '<img src="' + item.cover + '" alt="Portada" class="book-img">' +
        '<div class="book-stars">' + stars(item.stars) + '</div>' +
      '</div>';
    action = '<a href="lecturas.html" class="download-btn">Ver en Lecturas →</a>';
  } else if (item._type === 'script') {
    leftCol =
      '<div class="script-ext-wrap">' +
        '<div class="script-ext">' + item.extension + '</div>' +
      '</div>';
    action = '<a href="' + item.download + '" class="download-btn" download>Descargar ↓</a>';
  } else if (item._type === 'ensayo') {
    leftCol =
      '<div class="script-ext-wrap">' +
        '<div class="script-ext">' + item.tipo + '</div>' +
      '</div>';
    action = item.url
      ? '<a href="' + item.url + '" class="download-btn" target="_blank">Ver ensayo →</a>'
      : '';
  } else {
    var icon  = iconMap[item.formato]  || 'fas fa-link';
    var color = colorMap[item.formato] || '#3b3458';
    leftCol =
      '<div class="script-ext-wrap">' +
        '<div class="resource-badge" style="background:' + color + '">' +
          '<i class="' + icon + '"></i>' +
        '</div>' +
      '</div>';
    action = '<a href="' + item.url + '" class="download-btn" target="_blank">Acceder →</a>';
  }
  return '<div class="book-card' + (item._type === 'script' ? ' script-card' : '') + '">' +
    leftCol +
    '<div class="book-meta">' +
      '<span class="entry-date">Añadido: ' + item.fecha + '</span>' +
      '<div class="book-title">' + item.title + '</div>' +
      '<div class="script-byline">' +
        '<span class="book-author">' + item.author + '</span>' +
        '<span class="script-sep">·</span>' +
        '<span class="book-year">' + item.year + '</span>' +
      '</div>' +
      '<p class="book-caption">' + item.caption + '</p>' +
      action +
    '</div>' +
  '</div>';
}

/* ── estado ───────────────────────────────────────────────────────────── */
var ITEMS_PER_PAGE      = 6;
var currentExplorarPage = 1;
var activeExplorarTag   = null;

/* ── chips con conteo ─────────────────────────────────────────────────── */
(function() {
  var tagCounts = {};
  ALL_DATA.forEach(function(item) {
    if (item.tags) item.tags.forEach(function(t) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });
  var tags = Object.keys(tagCounts).sort();
  var el = document.getElementById('explorar-tags');
  if (!el) return;
  el.innerHTML =
    '<button class="tag-chip tag-chip--active" data-tag="" onclick="filterExplorar(null)">ver todo</button>' +
    tags.map(function(t) {
      return '<button class="tag-chip" data-tag="' + t + '" onclick="filterExplorar(\'' + t + '\')">' +
        t + ' <span class="chip-count">(' + tagCounts[t] + ')</span></button>';
    }).join('');

  /* pre-seleccionar desde URL hash (llegando desde el Home) */
  var hash = decodeURIComponent(window.location.hash.slice(1));
  if (hash && tagCounts[hash]) filterExplorar(hash);
  else renderExplorar();
})();

/* ── render ───────────────────────────────────────────────────────────── */
function renderExplorar() {
  var data = activeExplorarTag
    ? ALL_DATA.filter(function(item) { return item.tags && item.tags.indexOf(activeExplorarTag) > -1; })
    : ALL_DATA;
  var totalPages = Math.ceil(data.length / ITEMS_PER_PAGE) || 1;
  if (currentExplorarPage > totalPages) currentExplorarPage = 1;
  var start = (currentExplorarPage - 1) * ITEMS_PER_PAGE;
  document.getElementById('explorar-cards').innerHTML =
    data.slice(start, start + ITEMS_PER_PAGE).map(explorarCardHtml).join('');
  renderExplorarPagination(totalPages);
}

function renderExplorarPagination(totalPages) {
  var el = document.getElementById('explorar-pagination');
  if (!el) return;
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = Array.from({length: totalPages}, function(_, i) {
    var p = i + 1;
    return '<button class="page-btn' + (p === currentExplorarPage ? ' page-btn--active' : '') +
      '" onclick="goToExplorarPage(' + p + ')">' + p + '</button>';
  }).join('');
}

function goToExplorarPage(p) {
  currentExplorarPage = p;
  renderExplorar();
  var el = document.getElementById('explorar-cards');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function filterExplorar(tag) {
  activeExplorarTag   = tag;
  currentExplorarPage = 1;
  if (tag) history.replaceState(null, '', '#' + tag);
  else     history.replaceState(null, '', window.location.pathname);
  document.querySelectorAll('#explorar-tags .tag-chip').forEach(function(btn) {
    btn.classList.toggle('tag-chip--active', btn.dataset.tag === (tag || ''));
  });
  renderExplorar();
}
</script>

    const xrefs = window.document.querySelectorAll('a.quarto-xref');
    const processXRef = (id, note) => {
      // Strip column container classes
      const stripColumnClz = (el) => {
        el.classList.remove("page-full", "page-columns");
        if (el.children) {
          for (const child of el.children) {
            stripColumnClz(child);
          }
        }
      }
      stripColumnClz(note)
      if (id === null || id.startsWith('sec-')) {
        // Special case sections, only their first couple elements
        const container = document.createElement("div");
        if (note.children && note.children.length > 2) {
          container.appendChild(note.children[0].cloneNode(true));
          for (let i = 1; i < note.children.length; i++) {
            const child = note.children[i];
            if (child.tagName === "P" && child.innerText === "") {
              continue;
            } else {
              container.appendChild(child.cloneNode(true));
              break;
            }
          }
          if (window.Quarto?.typesetMath) {
            window.Quarto.typesetMath(container);
          }
          return container.innerHTML
        } else {
          if (window.Quarto?.typesetMath) {
            window.Quarto.typesetMath(note);
          }
          return note.innerHTML;
        }
      } else {
        // Remove any anchor links if they are present
        const anchorLink = note.querySelector('a.anchorjs-link');
        if (anchorLink) {
          anchorLink.remove();
        }
        if (window.Quarto?.typesetMath) {
          window.Quarto.typesetMath(note);
        }
        if (note.classList.contains("callout")) {
          return note.outerHTML;

    for (var i=0; i<xrefs.length; i++) {

        if (url.startsWith('#')) {

        } else {
          try { hash = new URL(url).hash; } catch {}
        }
        if (hash) {
          const id = hash.replace(/^#\/?/, "");
          const note = window.document.getElementById(id);
          if (note !== null) {
            try {
              const html = processXRef(id, note.cloneNode(true));
              instance.setContent(html);
            } finally {
              instance.enable();
              instance.show();
            }
          } else {
            // See if we can fetch this
            fetch(url.split('#')[0])
            .then(res => res.text())
            .then(html => {
              const parser = new DOMParser();
              const htmlDoc = parser.parseFromString(html, "text/html");
              const note = htmlDoc.getElementById(id);
              if (note !== null) {
                const html = processXRef(id, note);
                instance.setContent(html);
              } 
            }).finally(() => {
              instance.enable();
              instance.show();
            });
          }
        } else {
          // See if we can fetch a full url (with no hash to target)
          // This is a special case and we should probably do some content thinning / targeting
          fetch(url)
          .then(res => res.text())
          .then(html => {
            const parser = new DOMParser();
            const htmlDoc = parser.parseFromString(html, "text/html");
            const note = htmlDoc.querySelector('main.content');
            if (note !== null) {
              // This should only happen for chapter cross references
              // (since there is no id in the URL)
              // remove the first header
              if (note.children.length > 0 && note.children[0].tagName === "HEADER") {
                note.children[0].remove();
              }
              const html = processXRef(null, note);
              instance.setContent(html);
            } 
          }).finally(() => {
            instance.enable();
            instance.show();
          });
        }
      }, function(instance) {
      });
    }
        let selectedAnnoteEl;

              //compute the position of the single el (top and bottom and make a div)
              const el = window.document.getElementById(lineIds[0]);
              top = el.offsetTop;
              height = el.offsetHeight;
              parent = el.parentElement.parentElement;
            if (lineIds.length > 1) {
              const lastEl = window.document.getElementById(lineIds[lineIds.length - 1]);
              const bottom = lastEl.offsetTop + lastEl.offsetHeight;
              height = bottom - top;
            }
            if (top !== null && height !== null && parent !== null) {

                parent.appendChild(div);
              }
              div.style.top = top - 2 + "px";
              div.style.height = height + 4 + "px";
              div.style.left = 0;
              let gutterDiv = window.document.getElementById("code-annotation-line-highlight-gutter");
              if (gutterDiv === null) {

              gutterDiv.style.top = top - 2 + "px";
              gutterDiv.style.height = height + 4 + "px";
            }
            selectedAnnoteEl = annoteEl;
          }
        };
        const unselectCodeLines = () => {
          const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
          elementsIds.forEach((elId) => {

      window.addEventListener(

        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
          annoteDlNode.addEventListener('click', (event) => {
